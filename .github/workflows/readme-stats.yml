name: Update README cards

on:
  schedule:
    - cron: "0 3 * * *"
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Generate stats card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: stats
          options: username=${{ github.repository_owner }}&show_icons=true&custom_title=Stats&rank_icon=github&theme=tokyonight
          path: profile/stats.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Generate language card
        uses: stats-organization/github-readme-stats-action@v1
        with:
          card: top-langs
          options: username=${{ github.repository_owner }}&exclude_repo=KDU,MemoryModule,GoldDigger-CPP,Dungeon,CSGO-Internal,CSGO-External,CSGO-Bot&langs_count=8&hide=cmake&layout=compact&theme=tokyonight
          path: profile/top-langs.svg
          token: ${{ secrets.README_STATS_TOKEN }}

      - name: Commit cards
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add profile/*.svg
          git commit -m "Update README cards" || exit 0
          git push
